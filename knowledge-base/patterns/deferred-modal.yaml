id: deferred-modal
title: "Отложенное модальное окно"
category: form
when_to_use: |
  Используйте этот паттерн для показа модальных окон в управляемых
  формах. В 1С 8.3 модальные вызовы запрещены по умолчанию,
  поэтому используйте ПоказатьПредупреждение, ПоказатьВопрос,
  ПоказатьВводЗначения — асинхронные аналоги.
when_not_to_use: |
  Не используйте в серверных модулях — клиентские вызовы
  недоступны на сервере.
applicable_to:
  - module_form
code_template: |
  // {{form_name}}
  Процедура ПередЗакрытием(Отказ, СтандартнаяОбработка)
      Если НЕ Отказ Тогда
          ПоказатьПредупреждение(
              Новый ОписаниеОповещения("ПослеЗакрытияПредупреждения", ЭтотОбъект),
              "{{message_text}}"
          );
      КонецЕсли;
  КонецПроцедуры

  Процедура ПослеЗакрытияПредупреждения(ДополнительныеПараметры) Экспорт
      // {{after_action_code}}
  КонецПроцедуры
variables:
  - name: form_name
    description: Имя формы
    type: string
    required: true
  - name: message_text
    description: Текст предупреждения
    type: string
    required: true
  - name: after_action_code
    description: Код после закрытия предупреждения
    type: code
    required: false
example_good: |
  Процедура ПередЗакрытием(Отказ, СтандартнаяОбработка)
      Если ЕстьНесохраненныеДанные() Тогда
          ПоказатьПредупреждение(
              Новый ОписаниеОповещения("ПослеЗакрытияПредупреждения", ЭтотОбъект),
              "Есть несохранённые данные. Закрыть?"
          );
          Отказ = Истина;
      КонецЕсли;
  КонецПроцедуры

  Процедура ПослеЗакрытияПредупреждения(ДополнительныеПараметры) Экспорт
      Закрыть();
  КонецПроцедуры
depends_on_patterns: []
avoids_antipatterns:
  - modal-call-in-client
tags:
  - form
  - ui
  - async
