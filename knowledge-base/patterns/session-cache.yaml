id: session-cache
title: "Кэширование данных в сеансе"
category: caching
when_to_use: |
  Используйте этот паттерн для кэширования часто используемых
  данных в рамках сеанса пользователя. Паттерн обеспечивает:
  - хранение кэша в переменной модуля сеанса
  - ленивую инициализацию (при первом обращении)
  - возможность сброса кэша
when_not_to_use: |
  Не используйте для данных, которые часто меняются,
  или для данных, специфичных для конкретного объекта.
applicable_to:
  - module_common
code_template: |
  // {{module_name}}.Сервер
  Перем КэшДанных Экспорт;

  Функция ПолучитьДанные() Экспорт
      Если КэшДанных = Неопределено Тогда
          КэшДанных = {{load_code}};
      КонецЕсли;
      Возврат КэшДанных;
  КонецФункции

  Процедура СброситьКэш() Экспорт
      КэшДанных = Неопределено;
  КонецПроцедуры
variables:
  - name: module_name
    description: Имя общего модуля
    type: string
    required: true
  - name: load_code
    description: Код загрузки данных (запрос, вычисление)
    type: code
    required: true
example_good: |
  // ПараметрыРаботы.Сервер
  Перем КэшПараметров Экспорт;

  Функция ПолучитьПараметры() Экспорт
      Если КэшПараметров = Неопределено Тогда
          Запрос = Новый Запрос;
          Запрос.Текст = "ВЫБРАТЬ * FROM Справочник.Параметры";
          КэшПараметров = Запрос.Выполнить().Выгрузить();
      КонецЕсли;
      Возврат КэшПараметров;
  КонецФункции

  Процедура СброситьКэш() Экспорт
      КэшПараметров = Неопределено;
  КонецПроцедуры
depends_on_patterns: []
avoids_antipatterns:
  - query-in-loop
tags:
  - caching
  - performance
