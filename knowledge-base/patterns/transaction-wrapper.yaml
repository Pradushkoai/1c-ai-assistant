id: transaction-wrapper
title: "Транзакционный wrapper"
category: transaction
when_to_use: |
  Используйте этот паттерн при выполнении операций, требующих
  атомарности: запись наборов регистров, создание связанных объектов,
  массовые изменения данных. Паттерн обеспечивает:
  - транзакционную целостность (НачатьТранзакцию / ЗафиксироватьТранзакцию)
  - обработку ошибок (Исключение / ОтменитьТранзакцию)
  - запись в журнал регистрации при сбое
when_not_to_use: |
  Не используйте для чтения данных (запросы) или операций,
  не изменяющих данные (печать, экспорт).
applicable_to:
  - module_object
  - module_common
  - module_manager
code_template: |
  НачатьТранзакцию();
  Попытка
      // {{operation_code}}

      ЗафиксироватьТранзакцию();
  Исключение
      ОтменитьТранзакцию();
      ЗаписьЖурналаРегистрации(
          "{{event_name}}",
          УровеньЖурналаРегистрации.Ошибка,
          ,
          ,
          ПодробноеПредставлениеОшибки(ИнформацияОбОшибке())
      );
      ВызватьИсключение;
  КонецПопытки;
variables:
  - name: operation_code
    description: Код операции, выполняемой в транзакции
    type: code
    required: true
  - name: event_name
    description: Имя события для журнала регистрации
    type: string
    required: true
example_good: |
  НачатьТранзакцию();
  Попытка
      НаборЗаписей = РегистрыНакопления.Продажи.СоздатьНаборЗаписей();
      НаборЗаписей.Отбор.Регистратор.Установить(Ссылка);
      НаборЗаписей.Записать();
      ЗафиксироватьТранзакцию();
  Исключение
      ОтменитьТранзакцию();
      ЗаписьЖурналаРегистрации(
          "Продажи.ЗаписьДвижений",
          УровеньЖурналаРегистрации.Ошибка,
          ,
          ,
          ПодробноеПредставлениеОшибки(ИнформацияОбОшибке())
      );
      ВызватьИсключение;
  КонецПопытки;
depends_on_patterns: []
avoids_antipatterns:
  - try-catch-silent
  - transaction-without-try
tags:
  - transaction
  - error-handling
