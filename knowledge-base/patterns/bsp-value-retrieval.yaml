id: bsp-value-retrieval
title: "Получение значения через БСП"
category: validation
when_to_use: |
  Используйте этот паттерн для получения значений параметров,
  констант и других общих данных через БСП (Библиотеку
  стандартных подсистем). Паттерн обеспечивает:
  - единый способ доступа к данным
  - кэширование через БСП
  - обработку отсутствующих значений
when_not_to_use: |
  Не используйте, если проект не использует БСП.
applicable_to:
  - module_object
  - module_common
  - module_manager
code_template: |
  // Получение значения параметра через БСП
  ЗначениеПараметра = ОбщегоНазначения.ЗначениеПеременной("{{variable_name}}");

  // Получение константы через БСП
  ЗначениеКонстанты = ОбщегоНазначения.ПолучитьЗначениеКонстанты("{{constant_name}}");
variables:
  - name: variable_name
    description: Имя переменной БСП
    type: string
    required: false
  - name: constant_name
    description: Имя константы
    type: string
    required: false
example_good: |
  // Получение значения параметра через БСП
  ЮридическоеФизическоеЛицо = ОбщегоНазначения.ЗначениеПеременной("ЮридическоеФизическоеЛицо");

  // Получение константы через БСП
  ВалютаReg = ОбщегоНазначения.ПолучитьЗначениеКонстанты("ВалютаРегламентированногоУчета");
depends_on_patterns: []
avoids_antipatterns:
  - hardcoded-predefined
tags:
  - bsp
  - validation
  - data-access
