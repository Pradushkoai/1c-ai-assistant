id: sto-2.1-no-multiple-statements
title: "СТО 2.1: Один оператор на строку — без нескольких через ';'"
source:
  type: СТО
  code: "2.1"
  url: https://its.1c.ru/db/v8std#content:454:hdoc
category: style
severity: info
applicable_to:
  - module_object
  - module_form
  - module_common
  - module_manager
  - module_command
description: |
  Согласно СТО 1С «Тексты программ», в одной строке должен быть только один
  оператор. Запрещено разделять несколько операторов точкой с запятой на одной
  строке. Каждый оператор должен быть на отдельной строке для улучшения
  читаемости и упрощения отладки.

  Несколько операторов на строке:
  - Усложняют чтение (не видно структуры потока управления).
  - Затрудняют точечные правки в git diff.
  - Мешают установке точек останова в отладчике.
  - Приводят к ошибкам при copy/paste фрагментов.
detect:
  regex:
    pattern: ';[^;\n]+;'
    flags: ''
    context_lines: 1
example_bad: |
  А = 1; Б = 2; В = 3; // ← три оператора на одной строке
  Результат = А + Б; Сообщить("Готово"); // ← два оператора

  // Также плохо:
  Если Условие Тогда А = 1; КонецЕсли;
example_good: |
  А = 1;
  Б = 2;
  В = 3;

  Результат = А + Б;
  Сообщить("Готово");

  Если Условие Тогда
      А = 1;
  КонецЕсли;
recommendation_for_llm: |
  Каждый оператор пишите на отдельной строке. Не объединяйте операторы
  через точку с запятой. Это улучшает читаемость и упрощает отладку.
  Пустая строка между логическими блоками — рекомендуется.
recommendation_for_reviewer: |
  Проверьте, что в коде нет нескольких операторов на одной строке.
  Признак: более одной точки с запятой на строке с кодом. info finding.
tags:
  - style
  - sto
  - formatting
  - readability
