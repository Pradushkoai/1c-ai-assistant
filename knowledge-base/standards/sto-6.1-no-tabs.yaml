id: sto-6.1-no-tabs
title: "СТО 6.1: Отступы — 4 пробела, без табуляции"
source:
  type: СТО
  code: "6.1"
  url: https://its.1c.ru/db/v8std#content:456:hdoc
category: style
severity: warning
applicable_to:
  - module_object
  - module_form
  - module_common
  - module_manager
  - module_command
description: |
  Согласно СТО 1С «Стиль кодирования», в исходном коде на встроенном языке
  запрещено использовать символы табуляции для отступов. Все отступы должны
  быть выполнены пробелами в количестве 4 штук на каждый уровень вложенности.

  Использование табуляции приводит к:
  - Различному отображению кода в разных редакторах (таб = 4, 8 пробелов).
  - Ошибкам парсинга в BSL Language Server (BSL LS) и 1C:EDT.
  - Сложностям при code review (diff показывает лишние изменения).
  - Несовместимости с git-хуками линтеров.
detect:
  regex:
    pattern: '\t'
    flags: ''
    context_lines: 1
example_bad: |
  Процедура Тест()
  \tСообщить("Привет"); // ← символ табуляции
  \tЕсли Истина Тогда
  \t\tСообщить("Вложенный");
  \tКонецЕсли;
  КонецПроцедуры
example_good: |
  Процедура Тест()
      Сообщить("Привет"); // ← 4 пробела
      Если Истина Тогда
          Сообщить("Вложенный"); // ← 8 пробелов
      КонецЕсли;
  КонецПроцедуры
recommendation_for_llm: |
  Используйте 4 пробела для каждого уровня отступа. Никогда не используйте
  символ табуляции. В большинстве редакторов (VS Code, 1C:EDT) можно настроить
  автоматическую конвертацию табуляции в пробелы при сохранении файла.
recommendation_for_reviewer: |
  Проверьте, что в исходном коде нет символов табуляции (\t). Все отступы
  должны быть выполнены пробелами. При обнаружении табуляции — warning finding.
tags:
  - style
  - sto
  - formatting
  - indentation
