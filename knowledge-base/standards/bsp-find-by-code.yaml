id: bsp-find-by-code
title: "БСП: Не использовать НайтиПоКоду — используйте запрос"
source:
  type: БСП
  code: "common-modules-search"
  url: https://its.1c.ru/db/bsp3doc/browse/13/-1/893/
category: performance
severity: warning
applicable_to:
  - module_object
  - module_common
  - module_manager
description: |
  Согласно стандартам БСП, метод Справочник.НайтиПоКоду() не должен
  использоваться для массового поиска элементов. Аналогично
  НайтиПоНаименованию, этот метод выполняет полный обход таблицы на каждый
  вызов. Для массовой обработки используйте запрос с условием ГДЕ Код = &Код
  или соединение с временной таблицей.

  Дополнительно, метод НайтиПоКоду не использует индекс по полю Код
  в некоторых версиях платформы, что усугубляет проблему производительности.
  Запрос же гарантированно использует индекс.

  Случаи когда допустимо НайтиПоКоду:
  - Одиночный поиск по коду, известному из внешнего источника.
  - Тестовый код (не production).
  - Инициализация предопределённых элементов.
detect:
  regex:
    pattern: '\bНайтиПоКоду\s*\('
    flags: ''
    context_lines: 2
example_bad: |
  // Медленно в цикле
  Для Каждого СтрокаТЗ Из Данные Цикл
      Элемент = Справочники.Товары.НайтиПоКоду(СтрокаТЗ.Код);
      Если Не Элемент.Пустая() Тогда
          // ... обработка
      КонецЕсли;
  КонецЦикла;
example_good: |
  // Быстро: один запрос
  Запрос = Новый Запрос(
      "ВЫБРАТЬ
      |   Товары.Ссылка КАК Ссылка,
      |   Товары.Код КАК Код
      |ИЗ
      |   Справочник.Товары КАК Товары
      |ГДЕ
      |   Товары.Код В (&МассивКодов)"
  );
  Запрос.УстановитьПараметр("МассивКодов", МассивКодов);
  Результат = Запрос.Выполнить();
recommendation_for_llm: |
  Не используйте НайтиПоКоду() для поиска в циклах. Замените на запрос с
  условием ГДЕ Код = &Код для одиночного поиска или ГДЕ Код В (&МассивКодов)
  для массового. Это гарантирует использование индекса по полю Код.
recommendation_for_reviewer: |
  Проверьте использование НайтиПоКоду. Аналогично НайтиПоНаименованию —
  warning для массового поиска, допустимо для одиночного.
tags:
  - performance
  - bsp
  - queries
  - search
