id: sto-2.1-no-latin-var-decl
title: "СТО 2.1: Имена переменных на русском — запрет транслитерации"
source:
  type: СТО
  code: "2.1"
  url: https://its.1c.ru/db/v8std#content:454:hdoc
category: naming
severity: warning
applicable_to:
  - module_object
  - module_form
  - module_common
  - module_manager
  - module_command
description: |
  Согласно СТО 1С «Тексты программ», имена переменных, процедур и функций
  должны быть написаны на русском языке. Использование транслитерации
  (например, «Tovary» вместо «Товары») запрещено.

  Транслитерация:
  - Усложняет чтение кода (полу-английский, полу-русский стиль).
  - Приводит к неоднозначностям (Tovar, Tovary, Tovarye — все разные).
  - Не соответствует стандартам 1С:Предприятие 8.
  - Затрудняет автодополнение в 1C:EDT и BSL LS.

  Допускается использование латиницы только для:
  - Системных переменных (i, j, k в циклах).
  - API-интеграций (HTTP-методы, имена полей JSON).
  - Сокращений общепринятых (URL, ID, XML).
detect:
  regex:
    pattern: '^\s*Перем\s+[A-Za-z_][A-Za-z0-9_]*\s*[,;]'
    flags: m
    context_lines: 1
example_bad: |
  Перем Tovary;        // ← транслит
  Перем CustomerName;  // ← транслит
  Перем Counter;       // ← транслит

  Процедура Тест()
      Перем LocalVar; // ← транслит
  КонецПроцедуры
example_good: |
  Перем Товары;            // ← русское имя
  Перем ИмяПокупателя;     // ← русское имя
  Перем Счетчик;           // ← русское имя

  Процедура Тест()
      Перем ЛокальнаяПеременная;
  КонецПроцедуры
recommendation_for_llm: |
  Все переменные, процедуры и функции называйте на русском языке.
  Не используйте транслитерацию (Tovary, CustomerName, Counter).
  Правильно: Товары, ИмяПокупателя, Счетчик.
  Допускаются: i, j, k в циклах; URL, ID, XML в API-интеграциях.
recommendation_for_reviewer: |
  Проверьте объявления переменных (Перем) на транслитерацию. Латиница
  в именах переменных — warning finding. Исключения: i, j, k, url, id, xml.
tags:
  - naming
  - sto
  - russian
  - translit
