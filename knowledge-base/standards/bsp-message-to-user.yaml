id: bsp-message-to-user
title: "БСП: СообщитьПользователю вместо Сообщить"
source:
  type: БСП
  code: "user-messages"
  url: https://its.1c.ru/db/bsp3doc/browse/13/-1/2317/
category: client_server
severity: warning
applicable_to:
  - module_object
  - module_common
  - module_form
  - module_manager
description: |
  Согласно стандартам БСП, для вывода сообщений пользователю следует
  использовать метод ОбщегоНазначенияКлиентСервер.СообщитьПользователю()
  вместо встроенной функции Сообщить().

  Преимущества СообщитьПользователю:
  1. Привязка сообщения к конкретному полю формы (атрибут Поле).
  2. Сохранение в очередь сообщений (отображается даже при ошибке).
  3. Универсальность: работает в тонком, веб и мобильном клиентах.
  4. Поддержка локализации через НСтр().
  5. Сопоставление с проверкой заполнения (ПроверитьЗаполнение()).

  Метод Сообщить() следует использовать только для отладочного вывода
  в серверном коде, который не предназначен для пользователя.
detect:
  regex:
    pattern: '\bСообщить\s*\('
    flags: ''
    context_lines: 1
example_bad: |
  // Плохо: Сообщить без привязки к полю формы
  Если ПустаяСтрока(ИмяКонтрагента) Тогда
      Сообщить("Заполните имя контрагента");
      Возврат;
  КонецЕсли;

  // Также плохо в серверном коде, который видит пользователь
  Процедура ПриЗаписи(Отказ)
      Сообщить("Документ записан");
  КонецПроцедуры
example_good: |
  // Хорошо: СообщитьПользователю с привязкой к полю
  Если ПустаяСтрока(ИмяКонтрагента) Тогда
      ОбщегоНазначенияКлиентСервер.СообщитьПользователю(
          НСтр("ru = 'Заполните имя контрагента'"),
          "ИмяКонтрагента"  // ← поле формы для подсветки
      );
      Возврат;
  КонецЕсли;

  // Серверный код через БСП-функцию
  Процедура ПриЗаписи(Отказ)
      ОбщегоНазначенияКлиентСервер.СообщитьПользователю(
          НСтр("ru = 'Документ записан'"),
          "",
          Отказ
      );
  КонецПроцедуры
recommendation_for_llm: |
  Для всех сообщений пользователю используйте
  ОбщегоНазначенияКлиентСервер.СообщитьПользователю() вместо Сообщить().
  Указывайте поле формы для подсветки. Текст сообщения — через НСтр()
  для поддержки локализации. Сообщить() — только для отладки в серверном
  коде, недоступном пользователю.
recommendation_for_reviewer: |
  Проверьте все вызовы Сообщить(). Если сообщение видит пользователь —
  warning finding, рекомендуйте СообщитьПользователю. Допускается Сообщить()
  в отладочном коде с пометкой комментария.
tags:
  - bsp
  - client_server
  - ux
  - i18n
