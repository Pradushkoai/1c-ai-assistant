id: bsp-find-by-name
title: "БСП: Не использовать НайтиПоНаименованию — используйте запрос"
source:
  type: БСП
  code: "common-modules-search"
  url: https://its.1c.ru/db/bsp3doc/browse/13/-1/893/
category: performance
severity: warning
applicable_to:
  - module_object
  - module_common
  - module_manager
description: |
  Согласно стандартам БСП, метод Справочник.НайтиПоНаименованию() не должен
  использоваться для поиска элементов в циклах или при массовой обработке.
  Этот метод выполняет полный обход таблицы, что приводит к O(n) на каждый
  вызов и O(n×m) в цикле (m — итераций цикла).

  Вместо НайтиПоНаименованию следует использовать:
  1. Запрос с условием ГДЕ Наименование = &Наименование — для одиночного поиска.
  2. Временную таблицу + соединение — для массового поиска по списку.
  3. Кэширование в Соответствии / Таблице значений — для повторных поисков.

  Для сравнения: 1000 вызовов НайтиПоНаименованию = ~2 секунды,
  один запрос с 1000 ID в IN = ~50 миллисекунд.
detect:
  regex:
    pattern: '\bНайтиПоНаименованию\s*\('
    flags: ''
    context_lines: 2
example_bad: |
  // Медленно: O(n) на каждую итерацию
  Для Каждого СтрокаТЗ Из Товары Цикл
      Элемент = Справочники.Товары.НайтиПоНаименованию(СтрокаТЗ.Имя);
      // ... обработка
  КонецЦикла;

  // Также плохо: одиночный вызов в горячем коде
  Элемент = Справочники.Контрагенты.НайтиПоНаименованию(ИмяКонтрагента);
example_good: |
  // Быстро: один запрос вместо цикла
  Запрос = Новый Запрос(
      "ВЫБРАТЬ
      |   Товары.Ссылка КАК Ссылка
      |ПОМЕСТИТЬ ВТ_Имена
      |ИЗ
      |   &Товары КАК Товары
      |
      |ВЫБРАТЬ
      |   Т.Ссылка КАК Товар,
      |   Т.Имя КАК Имя
      |ИЗ
      |   ВТ_Имена КАК Т
      |       ВНУТРЕННЕЕ СОЕДИНЕНИЕ Справочник.Товары КАК Товары
      |           ПО Т.Имя = Товары.Наименование"
  );
recommendation_for_llm: |
  Не используйте НайтиПоНаименованию() для поиска в циклах или массовой
  обработке. Замените на запрос с условием ГДЕ Наименование = &Имя или
  на соединение с временной таблицей. Для одиночного поиска по известному
  имени — допустимо, но лучше использовать запрос для единообразия.
recommendation_for_reviewer: |
  Проверьте использование НайтиПоНаименованию. Если вызов в цикле —
  критично (warning). Если одиночный вызов — допустимо, но рекомендуйте
  запрос. Обращайте внимание на контекст вызова.
tags:
  - performance
  - bsp
  - queries
  - search
