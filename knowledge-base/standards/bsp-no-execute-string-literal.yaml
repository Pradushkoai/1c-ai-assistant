id: bsp-no-execute-string-literal
title: "БСП: Запрет Выполнить() со строковым литералом — SQL/BSL injection"
source:
  type: БСП
  code: "security-execute"
  url: https://its.1c.ru/db/bsp3doc/browse/13/-1/2789/
category: security
severity: critical
applicable_to:
  - module_object
  - module_common
  - module_manager
description: |
  Согласно стандартам безопасности БСП, метод Выполнить() не должен
  вызываться со строковым литералом, содержащим динамически сформированный
  код. Это создаёт риск BSL injection — возможности выполнения
  непредусмотренного кода, если часть строки формируется из внешних данных.

  Аналогично SQL injection, BSL injection может привести к:
  - Несанкционированному доступу к данным.
  - Модификации или удалению данных.
  - Нарушению бизнес-логики.
  - Эскалации привилегий.

  Допустимые случаи Выполнить():
  - Текст запроса полностью статичен (без интерполяции).
  - Все переменные подставляются через Запрос.УстановитьПараметр().
  - Строка формируется из безопасных констант (перечислений).

  Категорически запрещено:
  - Подстановка пользовательского ввода в строку запроса.
  - Формирование кода через СтрШаблон() или СтрСоединить().
  - Использование Выполнить() для динамического вызова процедур.
detect:
  regex:
    pattern: '\bВыполнить\s*\(\s*"[^"]*"[^)]*\)'
    flags: ''
    context_lines: 2
example_bad: |
  // Критично: SQL injection через пользовательский ввод
  Запрос = Новый Запрос;
  Запрос.Текст = "ВЫБРАТЬ * FROM " + ИмяТаблицы;
  Результат = Запрос.Выполнить().Выгрузить();

  // Также плохо: BSL injection
  ИмяМетода = "Сообщить";
  Код = ИмяМетода + "('Test')";
  Выполнить(Код);

  // Выполнить с динамической строкой
  Выполнить("Сообщить(" + Текст + ")");
example_good: |
  // Безопасно: статичный текст + параметры
  Запрос = Новый Запрос(
      "ВЫБРАТЬ
      |   Т.Ссылка КАК Ссылка
      |ИЗ
      |   Справочник.Товары КАК Т
      |ГДЕ
      |   Т.Код = &Код"
  );
  Запрос.УстановитьПараметр("Код", КодТовара);
  Результат = Запрос.Выполнить();

  // Использование Выполнить() только со статичным кодом
  Если УсловиеВыполнения Тогда
      // Статичный код, без интерполяции
      Выполнить("А = 1; Б = 2;");
  КонецЕсли;
recommendation_for_llm: |
  Никогда не используйте Выполнить() с динамически сформированными строками.
  Все параметры запросов подставляйте через Запрос.УстановитьПараметр().
  Если нужно вызвать метод по имени — используйте CallByName (если доступен)
  или структуру диспетчеризации с if/elseif. Любая интерполяция строк в
  Выполнить() — потенциальная уязвимость.
recommendation_for_reviewer: |
  Проверьте все вызовы Выполнить(). Если аргумент — строковый литерал или
  формируется через конкатенацию/СтрШаблон — критично (critical finding).
  Даже если строка кажется безопасной, требуйте замены на статичный код или
  параметры запроса.
tags:
  - security
  - bsp
  - injection
  - critical
