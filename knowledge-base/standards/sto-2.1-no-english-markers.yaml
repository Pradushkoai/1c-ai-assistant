id: sto-2.1-no-english-markers
title: "СТО 2.1: Комментарии на русском — без английских маркеров"
source:
  type: СТО
  code: "2.1"
  url: https://its.1c.ru/db/v8std#content:454:hdoc
category: comments
severity: warning
applicable_to:
  - module_object
  - module_form
  - module_common
  - module_manager
  - module_command
description: |
  Согласно СТО 1С «Тексты программ», комментарии в коде должны быть написаны
  на русском языке. Запрещено использовать английские маркеры TODO, FIXME,
  HACK, XXX, NOTE и подобные — их следует заменять на русские аналоги:
  «TODO» → «НАДО СДЕЛАТЬ», «FIXME» → «ИСПРАВИТЬ», «HACK» → «ВРЕМЕННО»,
  «NOTE» → «ПРИМЕЧАНИЕ».

  Английские маркеры в комментариях:
  - Затрудняют поиск задач по коду для команды (кто не знает английского).
  - Не индексируются стандартными средствами 1С (Ctrl+F по русским словам).
  - Создают впечатление «чернового» кода, оставленного без внимания.
detect:
  regex:
    pattern: '//\s*(TODO|FIXME|HACK|XXX|NOTE)\b'
    flags: i
    context_lines: 1
example_bad: |
  // TODO: переписать на БСП
  // FIXME: утечка памяти
  // HACK: временное решение, удалить в 2024
  // NOTE: см. https://...
  Процедура Тест()
      Сообщить("Hello");
  КонецПроцедуры
example_good: |
  // НАДО СДЕЛАТЬ: переписать на БСП
  // ИСПРАВИТЬ: утечка памяти
  // ВРЕМЕННО: убрать после релиза 2026.1
  // ПРИМЕЧАНИЕ: см. https://...
  Процедура Тест()
      Сообщить("Привет");
  КонецПроцедуры
recommendation_for_llm: |
  При написании комментариев используйте русские маркеры вместо английских:
  «НАДО СДЕЛАТЬ» вместо TODO, «ИСПРАВИТЬ» вместо FIXME, «ВРЕМЕННО» вместо HACK,
  «ПРИМЕЧАНИЕ» вместо NOTE. Все комментарии — только на русском языке.
recommendation_for_reviewer: |
  Проверьте комментарии на наличие английских маркеров TODO/FIXME/HACK/XXX/NOTE.
  Найденные — помечать как warning. Допускается латиница в технических терминах
  (API, JSON, HTTP), но не в маркерах задач.
tags:
  - comments
  - sto
  - i18n
  - russian
