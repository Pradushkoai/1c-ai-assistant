id: metadata-on-client
title: "Обращение к Метаданные на клиенте"
category: client_server
severity: critical
applicable_to:
  - module_form
  - module_command
detect:
  regex:
    pattern: 'Метаданные\.|Метаданные\('
    flags: m
    context_lines: 1
example_bad: |
  &НаКлиенте
  Процедура ПриОткрытии(Отказ)
      Если Метаданные.Справочники.Товары.ДлинаКода = 9 Тогда
          // ...
      КонецЕсли;
  КонецПроцедуры;
example_good: |
  &НаКлиенте
  Процедура ПриОткрытии(Отказ)
      ДлинаКода = ПолучитьДлинуКодаНаСервере();
      Если ДлинаКода = 9 Тогда
          // ...
      КонецЕсли;
  КонецПроцедуры

  &НаСервере
  Функция ПолучитьДлинуКодаНаСервере()
      Возврат Метаданные.Справочники.Товары.ДлинаКода;
  КонецФункции
recommendation_for_llm: |
  Обращение к свойству Метаданные доступно только на сервере.
  На клиенте вызывает ошибку выполнения.
  Замените на:
  1. Создайте серверную функцию для получения нужных метаданных.
  2. Вызовите её с клиента и используйте результат.
  Методы, НЕдоступные на клиенте:
  - Метаданные
  - ЗаписьЖурналаРегистрации
  - ПараметрыСеанса
  - Константы
  - ФоновыеЗадания
recommendation_for_reviewer: |
  Проверьте, что в клиентских процедурах (&НаКлиенте) нет
  обращений к Метаданные, ЗаписьЖурналаРегистрации, ПараметрыСеанса,
  Константы, ФоновыеЗадания. Если есть — critical finding.
tags:
  - client_server
  - context
