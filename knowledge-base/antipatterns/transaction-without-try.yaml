id: transaction-without-try
title: "Транзакция без Try/Catch"
category: transactions
severity: critical
applicable_to:
  - module_object
  - module_common
  - module_manager
detect:
  regex:
    pattern: "НачатьТранзакцию\\s*\\(\\s*\\)\\s*;(?:(?!Попытка).)*?ЗафиксироватьТранзакцию"
    flags: ms
    context_lines: 5
example_bad: |
  НачатьТранзакцию();
  НаборЗаписей.Записать();
  ЗафиксироватьТранзакцию();
example_good: |
  НачатьТранзакцию();
  Попытка
      НаборЗаписей.Записать();
      ЗафиксироватьТранзакцию();
  Исключение
      ОтменитьТранзакцию();
      ЗаписьЖурналаРегистрации(
          "Ошибка",
          УровеньЖурналаРегистрации.Ошибка,
          ,
          ,
          ПодробноеПредставлениеОшибки(ИнформацияОбОшибке())
      );
      ВызватьИсключение;
  КонецПопытки;
recommendation_for_llm: |
  Транзакция без Try/Catch:
  1. При ошибке транзакция не отменяется (остаются частичные изменения).
  2. Ошибка не логируется.
  Оберните тело транзакции в Попытка/Исключение:
  1. НачатьТранзакцию()
  2. Попытка ... ЗафиксироватьТранзакцию()
  3. Исключение ... ОтменитьТранзакцию() + ЗаписьЖурналаРегистрации + ВызватьИсключение
recommendation_for_reviewer: |
  Проверьте, что каждая НачатьТранзакцию сопровождается
  Попытка/Исключение. Если нет — critical finding.
tags:
  - transactions
  - error-handling
