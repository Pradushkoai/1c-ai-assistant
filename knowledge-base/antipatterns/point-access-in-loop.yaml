id: point-access-in-loop
title: "Точечный доступ к данным в цикле"
category: performance
severity: warning
applicable_to:
  - module_object
  - module_form
  - module_common
detect:
  regex:
    pattern: "Для\\s+Каждого.*?\\n.*?\\.(Наименование|Код)\\s*[^=]"
    flags: ms
    context_lines: 2
example_bad: |
  Для Каждого СтрокаТовары Из Товары Цикл
      Сообщить(СтрокаТовары.Номенклатура.Наименование);
  КонецЦикла;
example_good: |
  Запрос = Новый Запрос;
  Запрос.Текст = "ВЫБРАТЬ Номенклатура.Наименование FROM Документ.Продажа.Товары КАК Товары";
  Результат = Запрос.Выполнить().Выгрузить();
  Для Каждого СтрокаРезультата Из Результат Цикл
      Сообщить(СтрокаРезультата.Наименование);
  КонецЦикла;
recommendation_for_llm: |
  Точечный доступ к данным (через точку от ссылки) в цикле
  вызывает неявные запросы. Замените на:
  1. Запрос, который сразу получает нужные поля через ВЫБРАТЬ.
  2. Итерация по результату запроса, а не по ссылкам.
recommendation_for_reviewer: |
  Проверьте, что в циклах нет обращений через точку к данным
  ссылочных типов (Наименование, Код). Если есть — warning finding.
tags:
  - performance
  - queries
