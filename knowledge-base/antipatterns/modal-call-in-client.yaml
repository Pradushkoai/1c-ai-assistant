id: modal-call-in-client
title: "Модальный вызов в клиентском коде"
category: client_server
severity: critical
applicable_to:
  - module_form
  - module_common
detect:
  regex:
    pattern: 'Вопрос\(|Предупреждение\(|ОткрытьЗначение\(|ОткрытьФормуМодально\('
    flags: m
    context_lines: 1
example_bad: |
  Ответ = Вопрос("Удалить элемент?", РежимДиалогаВопрос.ДаНет);
  Если Ответ = КодВозвратаДиалога.Да Тогда
      Удалить();
  КонецЕсли;
example_good: |
  ОписаниеОповещения = Новый ОписаниеОповещения("ПослеВопросаУдаления", ЭтотОбъект);
  ПоказатьВопрос(ОписаниеОповещения, "Удалить элемент?", РежимДиалогаВопрос.ДаНет);

  Процедура ПослеВопросаУдаления(Результат, Параметры) Экспорт
      Если Результат = КодВозвратаДиалога.Да Тогда
          Удалить();
      КонецЕсли;
  КонецПроцедуры
recommendation_for_llm: |
  Модальные вызовы запрещены в управляемых формах (1С 8.3).
  Замените на асинхронные аналоги:
  - Вопрос → ПоказатьВопрос
  - Предупреждение → ПоказатьПредупреждение
  - ОткрытьЗначение → ПоказатьЗначение
  - ОткрытьФормуМодально → ОткрытьФорму (с обработчиком закрытия)
recommendation_for_reviewer: |
  Проверьте, что в клиентском коде нет модальных вызовов.
  Если есть — critical finding (код не будет работать в 8.3).
tags:
  - client_server
  - forms
  - async
