id: commit-in-loop
title: "Запись в цикле"
category: performance
severity: critical
applicable_to:
  - module_object
  - module_form
  - module_common
  - module_manager
detect:
  regex:
    pattern: "Для\\s+Каждого.*?\\n.*?\\.(Записать|ЗаписатьОбъект)\\s*\\("
    flags: ms
    context_lines: 2
example_bad: |
  Для Каждого Элемент Из МассивЭлементов Цикл
      Элемент.Записать();
  КонецЦикла;
example_good: |
  // Используйте пакетную запись через набор записей
  НаборЗаписей = РегистрыСведений.КурсыВалют.СоздатьНаборЗаписей();
  Для Каждого Элемент Из МассивЭлементов Цикл
      Запись = НаборЗаписей.Добавить();
      Запись.Валюта = Элемент.Валюта;
      Запись.Курс = Элемент.Курс;
  КонецЦикла;
  НаборЗаписей.Записать();
recommendation_for_llm: |
  Запись в цикле вызывает отдельную транзакцию на каждой итерации.
  Замените на:
  1. Пакетную запись через НаборЗаписей (для регистров).
  2. Или соберите объекты в массив и запишите за одну транзакцию.
recommendation_for_reviewer: |
  Проверьте, что в циклах нет вызовов Записать().
  Если есть — critical finding (производительность).
tags:
  - performance
  - transactions
