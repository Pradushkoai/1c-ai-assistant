id: hardcoded-predefined
title: "Хардкод предопределённых значений"
category: style
severity: warning
applicable_to:
  - module_object
  - module_form
  - module_common
  - module_manager
detect:
  regex:
    pattern: 'ПредопределенныйЭлемент\(|Справочники\.\w+\.(\w+)[^.]'
    flags: m
    context_lines: 1
example_bad: |
  Если Контрагент.Вид = Справочники.ВидыКонтрагентов.ЮридическоеЛицо Тогда
      // ...
  КонецЕсли;
example_good: |
  ВидКонтрагента = ОбщегоНазначения.ЗначениеПеременной("ВидЮридическоеЛицо");
  Если Контрагент.Вид = ВидКонтрагента Тогда
      // ...
  КонецЕсли;
recommendation_for_llm: |
  Хардкод предопределённых значений ломает переносимость между конфигурациями.
  Замените на:
  1. Получение значения через БСП (ОбщегоНазначения.ЗначениеПеременной).
  2. Или через параметры сеанса.
recommendation_for_reviewer: |
  Проверьте, что предопределённые значения не хардкожены,
  а получаются через БСП или параметры.
tags:
  - style
  - portability
  - bsp
