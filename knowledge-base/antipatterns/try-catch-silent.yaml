id: try-catch-silent
title: "Молчаливый catch"
category: transactions
severity: critical
applicable_to:
  - module_object
  - module_form
  - module_common
  - module_manager
detect:
  regex:
    pattern: "Исключение\\s*\\n\\s*(КонецПопытки|//)"
    flags: ms
    context_lines: 2
example_bad: |
  Попытка
      НаборЗаписей.Записать();
  Исключение
      // ничего не делаем
  КонецПопытки;
example_good: |
  Попытка
      НаборЗаписей.Записать();
  Исключение
      ЗаписьЖурналаРегистрации(
          "Ошибка записи",
          УровеньЖурналаРегистрации.Ошибка,
          ,
          ,
          ПодробноеПредставлениеОшибки(ИнформацияОбОшибке())
      );
      ВызватьИсключение;
  КонецПопытки;
recommendation_for_llm: |
  Молчаливый catch скрывает ошибки. Всегда:
  1. Запишите ошибку в журнал регистрации через ЗаписьЖурналаРегистрации.
  2. Если в транзакции — вызовите ОтменитьТранзакцию.
  3. Если ошибка критична — ВызватьИсключение для передачи выше.
recommendation_for_reviewer: |
  Проверьте, что каждый блок Исключение содержит хотя бы
  ЗаписьЖурналаРегистрации. Пустые исключения — critical finding.
tags:
  - error-handling
  - transactions
