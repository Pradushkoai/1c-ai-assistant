# .github/workflows/integration.yml
# Integration tests — требуют Docker контейнеры (postgres, bsl-ls).
# Запускаются вручную или nightly.
# См. TESTING_POLICY.md раздел 10.2.

name: Integration tests

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"  # nightly в 03:00 UTC

jobs:
  integration:
    name: Integration (postgres + bsl-ls)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras --all-packages

      - name: Start Docker containers
        run: docker compose up -d --wait
        timeout-minutes: 5

      - name: Show container status
        run: docker compose ps

      - name: Wait for postgres
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U agent; then
              echo "Postgres is ready"
              exit 0
            fi
            sleep 2
          done
          echo "Postgres failed to start"
          docker compose logs postgres
          exit 1

      - name: Create temp git repo for tests
        run: |
          git init -b main test-git-repo
          cd test-git-repo
          git config user.email "ci@test.com"
          git config user.name "CI"
          echo "# Test repo" > README.md
          git add README.md
          git commit -m "initial"

      - name: Run integration tests
        run: uv run pytest tests/integration/ -m integration --tb=short -v
        env:
          DATABASE_URL: postgresql://agent:agent@localhost:5432/agent
          TEST_POSTGRES_DSN: postgresql://agent:agent@localhost:5432/agent
          BSL_LS_HTTP_URL: http://localhost:8080
          TEST_GIT_REPO: ${{ github.workspace }}/test-git-repo

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== postgres logs ==="
          docker compose logs postgres
          echo "=== bsl-ls logs ==="
          docker compose logs 1c-ai-bsl-ls

      - name: Tear down
        if: always()
        run: docker compose down -v
