# A generic, single database configuration.

[alembic]
# path to migration scripts.
script_location = migrations/alembic

# template used to generate migration files.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# sys.path prepend — чтобы импортировать пакетные модули при необходимости.
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
timezone = UTC

# max length of characters to apply to the "slug" field
truncate_slug_length = 40

# output encoding used when revision files are written from script.py.mako
output_encoding = utf-8

# DSN берётся из env DATABASE_URL (см. docker-compose.yml). Для не-Docker запуска
# можно задать DATABASE_URL=postgresql://agent:agent@localhost:5432/agent.
# ВНИМАНИЕ: Alembic НЕ управляет LangGraph checkpoint-таблицами — их создаёт
# AsyncPostgresSaver.setup(). Alembic управляет ТОЛЬКО приложенческими таблицами.
# См. migrations/README.md и ADR-0018 / D-2026-07-13-05.
sqlalchemy.url =


[post_write_hooks]
# (placeholder — хуки при необходимости)


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
