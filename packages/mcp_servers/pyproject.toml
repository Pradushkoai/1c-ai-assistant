[project]
name = "mcp-servers"
version = "0.1.0"
requires-python = ">=3.12"
description = "MCP servers: metadata, codebase, kb, bsl_ls, git + Facade"
dependencies = [
    "pydantic>=2.5,<3.0",
    "mcp>=1.0,<2.0",
    "httpx>=0.27,<1.0",
    "structlog>=24.0,<26.0",
    "parsers",
    "data-layer",
]

[project.optional-dependencies]
qdrant = ["qdrant-client>=1.0,<2.0"]
api = ["fastapi>=0.110,<1.0", "uvicorn>=0.27,<1.0"]

[tool.uv.sources]
parsers = { workspace = true }
data_layer = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/mcp_servers"]
