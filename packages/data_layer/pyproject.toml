[project]
name = "data-layer"
version = "0.1.0"
requires-python = ">=3.12"
description = "PathManager, ConfigRegistry, freshness check — file system layer"
dependencies = [
    "pydantic>=2.5,<3.0",
    "parsers",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/data_layer"]
