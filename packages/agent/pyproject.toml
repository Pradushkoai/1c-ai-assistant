[project]
name = "agent"
version = "0.1.0"
requires-python = ">=3.12"
description = "CLI and entry points: 1c-ai command"
dependencies = [
    "click>=8.1,<9.0",
    "orchestrator",
    "mcp_servers",
    "data_layer",
    "parsers",
]

[project.scripts]
1c-ai = "agent.cli:main"
1c-ai-mcp = "mcp_servers.facade.server:run_sync"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agent"]
